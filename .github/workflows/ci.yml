name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ngx
          POSTGRES_PASSWORD: ngx_password
          POSTGRES_DB: ngx_saas_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U ngx"
          --health-interval 5s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 5
    env:
      ENVIRONMENT: development
      DATABASE_URL: postgresql+asyncpg://ngx:ngx_password@localhost:5432/ngx_saas_test
      TEST_DATABASE_URL: postgresql+asyncpg://ngx:ngx_password@localhost:5432/ngx_saas_test
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET_KEY: ci-test-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -e ".[dev]"
      # Lint is advisory for now — the codebase carries pre-existing ruff debt.
      # Flip these to blocking once that's cleaned up (see follow-up).
      - name: Ruff lint (advisory)
        run: ruff check app tests
        continue-on-error: true
      - name: Ruff format check (advisory)
        run: ruff format --check app tests
        continue-on-error: true
      - name: Pytest
        run: pytest -q

  frontend:
    name: Frontend (build + vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Unit tests
        run: npm run test
      - name: Type-check + build
        run: npm run build

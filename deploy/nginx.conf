# ─────────────────────────────────────────────────────────────────────────
#  Vortex — production reverse proxy (Nginx)
#
#  Terminates TLS, redirects HTTP→HTTPS, sets security headers (HSTS, CSP…),
#  proxies /api + the WebSocket to the FastAPI backend, and serves the built
#  React SPA. See deploy/README.md for the Certbot / wiring steps.
#
#  Replace `vortex.example.com` with your domain before use.
# ─────────────────────────────────────────────────────────────────────────

upstream vortex_backend {
    server backend:8000;
}

# ── HTTP → HTTPS redirect (and ACME challenge passthrough) ──
server {
    listen 80;
    listen [::]:80;
    server_name vortex.example.com;

    # Let's Encrypt HTTP-01 challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ──
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name vortex.example.com;

    # Certbot-managed certificates
    ssl_certificate     /etc/letsencrypt/live/vortex.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vortex.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # ── Security headers ──
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    # CSP: tighten 'connect-src'/'img-src' to your real origins. 'unsafe-inline'
    # for styles is needed by the injected <style> blocks; drop it if you extract CSS.
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self'; connect-src 'self' https: wss:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    client_max_body_size 10m;

    # ── API ──
    location /api/ {
        proxy_pass http://vortex_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── WebSocket (live prices) ──
    location /api/v1/ws/ {
        proxy_pass http://vortex_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
    }

    # ── SPA (built React assets) ──
    # `npm run build` output (frontend/dist) mounted here.
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
